name: Build & Release

# Manually triggered from the Actions tab ("Run workflow" button).
# 1. The `build` job runs EAS Build in the cloud and waits for the binaries.
# 2. The `publish` job is gated behind the `production` GitHub Environment.
#    If you add required reviewers to that environment (repo Settings ->
#    Environments -> production), GitHub pauses here and shows an "Approve"
#    button. Nothing is submitted to the stores until you click it.

on:
  workflow_dispatch:
    inputs:
      platform:
        description: Platform to build
        type: choice
        default: all
        options:
          - all
          - android
          - ios
      profile:
        description: EAS build profile
        type: choice
        default: production
        options:
          - production
          - preview

concurrency:
  group: build-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build (${{ inputs.platform }} / ${{ inputs.profile }})
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build with EAS
        run: eas build --platform ${{ inputs.platform }} --profile ${{ inputs.profile }} --non-interactive --wait

  publish:
    name: Publish to stores
    needs: build
    # Only offer to submit real production builds.
    if: ${{ inputs.profile == 'production' }}
    runs-on: ubuntu-latest
    # This is the approval gate. Add "Required reviewers" to the `production`
    # environment to turn store submission into a one-click approval.
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Submit latest build to stores
        run: eas submit --platform ${{ inputs.platform }} --profile production --latest --non-interactive
